apiVersion: v1
kind: Pod
metadata:
  name: failed-test-pod-1
  namespace: dashboard-test
  labels:
    app: failed-test
    env: test
    type: failed
spec:
  containers:
  - name: busybox
    image: busybox:1.36
    command:
      - sh
      - -c
      - "exit 1"
    resources:
      requests:
        memory: "16Mi"
        cpu: "25m"
      limits:
        memory: "32Mi"
        cpu: "50m"
  restartPolicy: Never
