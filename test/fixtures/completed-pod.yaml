apiVersion: v1
kind: Pod
metadata:
  name: completed-job-pod
  namespace: dashboard-test
  labels:
    app: completed-job
    env: test
    type: completed
spec:
  containers:
  - name: job-runner
    image: busybox:1.36
    command:
      - sh
      - -c
      - "echo 'job completed successfully'; exit 0"
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"
  restartPolicy: Never
