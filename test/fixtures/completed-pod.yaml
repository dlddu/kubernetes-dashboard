apiVersion: v1
kind: Pod
metadata:
  name: completed-test-pod-1
  namespace: dashboard-test
  labels:
    app: completed-test
    env: test
    type: completed
spec:
  containers:
  - name: busybox
    image: busybox:1.36
    command:
      - sh
      - -c
      - "echo done"
    resources:
      requests:
        memory: "16Mi"
        cpu: "25m"
      limits:
        memory: "32Mi"
        cpu: "50m"
  restartPolicy: Never
---
