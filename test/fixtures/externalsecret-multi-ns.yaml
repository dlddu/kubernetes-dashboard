apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frontend-secrets
  namespace: dashboard-test
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: SecretStore
    name: vault-backend
  target:
    name: frontend-secrets
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/frontend/prod
        property: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault-backend
  target:
    name: backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: secret/backend/prod
        property: api-key
