apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets-failing
  namespace: dashboard-test
spec:
  refreshInterval: 30m
  secretStoreRef:
    kind: SecretStore
    name: missing-store
  target:
    name: app-secrets-failing-target
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: secret/app/db
        property: password
