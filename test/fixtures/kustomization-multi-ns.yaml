apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: frontend-app
  namespace: dashboard-test
spec:
  interval: 5m
  path: ./frontend
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
status:
  conditions:
    - type: Ready
      status: "True"
      lastTransitionTime: "2026-03-14T06:00:00Z"
      reason: ReconciliationSucceeded
      message: "Applied revision: main@sha1:abc123"
  lastAppliedRevision: "main@sha1:abc123"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backend-app
  namespace: default
spec:
  interval: 10m
  path: ./backend
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
status:
  conditions:
    - type: Ready
      status: "True"
      lastTransitionTime: "2026-03-14T06:05:00Z"
      reason: ReconciliationSucceeded
      message: "Applied revision: main@sha1:def456"
  lastAppliedRevision: "main@sha1:def456"
